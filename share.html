<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Shared Chat - Form Sahayak</title>
  <link rel="stylesheet" href="/css/design-system.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <style>
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      padding: 16px 20px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-secondary);
      flex-shrink: 0;
    }
    .topbar h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }
    .read-only-badge {
      font-size: 12px;
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent-blue);
      padding: 4px 10px;
      border-radius: 12px;
      font-weight: 600;
    }
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }
    /* Simplified bubbles for read-only view */
    .bubble {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14.5px;
      line-height: 1.5;
    }
    .bubble.user {
      align-self: flex-end;
      background: var(--accent-blue);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble.ai {
      align-self: flex-start;
      background: var(--bg-secondary);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
    }
    .message-role {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .loading-state {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      color: var(--text-tertiary);
      font-size: 15px;
    }
    .form-card {
      background: var(--bg-primary);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 12px;
      margin-top: 10px;
    }
    .form-name {
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 15px;
      color: var(--accent-blue);
    }
    .field-row {
      display: grid;
      grid-template-columns: 24px 1fr 1fr;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--glass-border);
      font-size: 13px;
    }
    .field-row:last-child {
      border-bottom: none;
    }
    .fn { color: var(--text-tertiary); font-family: monospace; }
    .fl { font-weight: 500; }
    .fe { color: var(--text-secondary); }
  </style>
</head>
<body>

  <header class="topbar">
    <h1>Form Sahayak</h1>
    <span class="read-only-badge">Read-only Shared Chat</span>
  </header>

  <div id="chatContainer" class="chat-container">
    <div class="loading-state">Chat load ho rahi hai...</div>
  </div>

  <script>
    async function init() {
      // Extract shareId from URL pathname: /s/abc123
      const pathParts = window.location.pathname.split('/');
      const shareId = pathParts[pathParts.length - 1];

      const container = document.getElementById('chatContainer');

      if (!shareId || shareId === 's') {
        container.innerHTML = '<div class="loading-state">Invalid Share Link.</div>';
        return;
      }

      try {
        const res = await fetch(`/api/share/${shareId}`);
        if (!res.ok) throw new Error('Chat nahi mili ya link expire ho gaya.');
        
        const data = await res.json();
        renderMessages(data.messages, container);
      } catch (err) {
        container.innerHTML = `<div class="loading-state" style="color:var(--error-color)">${err.message}</div>`;
      }
    }

    function renderMessages(messages, container) {
      container.innerHTML = '';
      if (!messages || messages.length === 0) {
        container.innerHTML = '<div class="loading-state">Chat khali hai.</div>';
        return;
      }

      messages.forEach(msg => {
        const bubble = document.createElement('div');
        bubble.className = `bubble ${msg.role === 'user' ? 'user' : 'ai'}`;
        
        if (msg.role !== 'user') {
          const roleHtml = `<div class="message-role"><span style="font-size:14px">🤖</span> Form Sahayak</div>`;
          bubble.innerHTML += roleHtml;
        }

        // Render string content
        if (typeof msg.content === 'string') {
          const textDiv = document.createElement('div');
          // simple markdown to html for bold text
          textDiv.innerHTML = msg.content
            .replace(/\n/g, '<br/>')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
          bubble.appendChild(textDiv);
        } else if (Array.isArray(msg.content)) {
          // Render text parts
          msg.content.forEach(part => {
            if (part.type === 'text') {
              const textDiv = document.createElement('div');
              textDiv.innerHTML = part.text
                .replace(/\n/g, '<br/>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
              bubble.appendChild(textDiv);
            }
          });
        }

        // Render forms data if ai
        if (msg.role === 'model' && msg.data && msg.data.forms) {
          msg.data.forms.forEach(form => {
            const card = document.createElement('div');
            card.className = 'form-card';
            
            const title = document.createElement('div');
            title.className = 'form-name';
            title.textContent = form.form_name || 'Form Details';
            card.appendChild(title);

            // fields or sections
            let fieldsToRender = form.fields || [];
            if (form.sections) {
              fieldsToRender = form.sections.flatMap(s => s.fields || []);
            }

            fieldsToRender.forEach((f, idx) => {
              const row = document.createElement('div');
              row.className = 'field-row';
              
              const fn = document.createElement('span');
              fn.className = 'fn';
              fn.textContent = String(idx + 1).padStart(2, '0');
              
              const fl = document.createElement('span');
              fl.className = 'fl';
              fl.textContent = f.label || '';
              
              const fe = document.createElement('span');
              fe.className = 'fe';
              fe.textContent = f.explanation || '';

              row.appendChild(fn);
              row.appendChild(fl);
              row.appendChild(fe);
              card.appendChild(row);
            });

            bubble.appendChild(card);
          });
        }

        container.appendChild(bubble);
      });
    }

    init();
  </script>
</body>
</html>
